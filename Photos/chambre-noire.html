<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>futur•e · Chambre noire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060810;
  --surface: #0d101a;
  --surface2: #131724;
  --border: #1a1f2e;
  --border-light: #242a3c;
  --text: #e8e4dc;
  --text-mid: #7a7d8a;
  --text-dim: #3e4150;
  --accent: #c8b89a;
  --accent-dim: #6a5e4a;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 24px 36px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.brand { font-family: 'Libre Baskerville', serif; font-size: 17px; }
.brand span { color: var(--accent); }
.brand em { font-style: italic; font-size: 13px; color: var(--text-mid); margin-left: 6px; }
.header-tag { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }

.app { flex: 1; display: grid; grid-template-columns: 1fr 380px; min-height: 0; }

/* CANVAS */
.canvas-zone {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  border-right: 1px solid var(--border);
  overflow: hidden;
  padding: 32px;
}
.canvas-zone::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle at 30% 20%, rgba(200,184,154,0.05), transparent 60%);
  pointer-events: none;
}

.drop-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  width: 420px;
  height: 320px;
  border: 1px dashed var(--border-light);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.drop-zone:hover { border-color: var(--accent-dim); transform: scale(1.01); }
.drop-zone.drag-over { border-color: var(--accent); background: rgba(200,184,154,0.04); }
.drop-icon { font-size: 36px; color: var(--text-dim); font-family: 'Libre Baskerville', serif; }
.drop-label { font-family: 'Libre Baskerville', serif; font-size: 17px; font-style: italic; color: var(--text-mid); }
.drop-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; }
#file-input { display: none; }

#preview-wrap {
  position: relative;
  display: none;
  max-width: 100%;
  max-height: 100%;
}
canvas#output-canvas {
  max-width: calc(100vw - 420px);
  max-height: calc(100vh - 140px);
  display: block;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
}

/* PANEL */
.panel {
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.panel-section { padding: 24px 24px 16px; border-bottom: 1px solid var(--border); }
.panel-section:last-of-type { border-bottom: none; }
.panel-label {
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* PRESETS — la grille visuelle en miniatures */
.preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.preset-tile {
  position: relative;
  aspect-ratio: 1;
  background: var(--surface2);
  border: 1px solid var(--border-light);
  cursor: pointer;
  overflow: hidden;
  transition: all 0.2s;
}
.preset-tile:hover { transform: translateY(-2px); border-color: var(--accent-dim); }
.preset-tile.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(200,184,154,0.15); }
.preset-thumb {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}
.preset-tile-fallback {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.preset-name {
  position: absolute;
  bottom: 8px;
  left: 10px;
  right: 10px;
  font-family: 'Libre Baskerville', serif;
  font-size: 13px;
  color: white;
  font-style: italic;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  z-index: 2;
  letter-spacing: -0.01em;
}
.preset-num {
  position: absolute;
  top: 8px;
  left: 10px;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.7);
  text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  z-index: 2;
}

/* INTENSITÉ */
.intensity-row { display: flex; gap: 6px; margin-top: 4px; }
.intensity-btn {
  flex: 1;
  padding: 10px 8px;
  background: var(--surface2);
  border: 1px solid var(--border-light);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: center;
}
.intensity-btn:hover { border-color: var(--accent-dim); color: var(--text); }
.intensity-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,184,154,0.04); }

/* FORMAT */
.format-row { display: flex; gap: 4px; }
.format-btn {
  flex: 1;
  padding: 8px 4px;
  background: var(--surface2);
  border: 1px solid var(--border-light);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 10px;
  letter-spacing: 0.04em;
  text-align: center;
}
.format-btn:hover { border-color: var(--accent-dim); color: var(--text); }
.format-btn.active { border-color: var(--accent); color: var(--accent); }

/* EXPORT */
.export-btn {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  border: none;
  color: var(--bg);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
}
.export-btn:hover:not(:disabled) { background: white; transform: translateY(-1px); }
.export-btn:disabled { background: var(--surface2); color: var(--text-dim); cursor: not-allowed; }
.export-sub { font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; text-align: center; margin-top: 8px; }

/* STATUS */
.status {
  padding: 10px 24px;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-dim); display: inline-block; margin-right: 6px; }
.status-dot.ready { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

/* RESET BTN */
.reset-link {
  display: block;
  text-align: center;
  margin-top: 12px;
  font-size: 10px;
  color: var(--text-dim);
  text-decoration: none;
  letter-spacing: 0.06em;
  cursor: pointer;
}
.reset-link:hover { color: var(--accent); }

/* loading state */
.processing { position: relative; }
.processing::after {
  content: 'TRAITEMENT...';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--accent);
  z-index: 100;
}
</style>
</head>
<body>

<header>
  <div class="brand">futur<span>•</span>e <em>· chambre noire</em></div>
  <div class="header-tag">Donnez la DA futur•e à vos photos</div>
</header>

<div class="app">

  <div class="canvas-zone" id="canvas-zone">
    <div class="drop-zone" id="drop-zone">
      <div class="drop-icon">⊕</div>
      <div class="drop-label">Déposez votre photo</div>
      <div class="drop-sub">JPG, PNG, WEBP · ou cliquez</div>
      <input type="file" id="file-input" accept="image/*">
    </div>
    <div id="preview-wrap">
      <canvas id="output-canvas"></canvas>
    </div>
  </div>

  <div class="panel">

    <div class="panel-section">
      <div class="panel-label">Choisissez un filtre</div>
      <div class="preset-grid" id="preset-grid">
        <!-- Tiles générées dynamiquement avec aperçu de l'image -->
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Intensité</div>
      <div class="intensity-row">
        <button class="intensity-btn" data-intensity="0.6" onclick="setIntensity(this)">Doux</button>
        <button class="intensity-btn active" data-intensity="1.0" onclick="setIntensity(this)">Standard</button>
        <button class="intensity-btn" data-intensity="1.4" onclick="setIntensity(this)">Fort</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Format</div>
      <div class="format-row">
        <button class="format-btn active" data-fmt="original" onclick="setFormat(this)">Original</button>
        <button class="format-btn" data-fmt="16/9" onclick="setFormat(this)">16:9</button>
        <button class="format-btn" data-fmt="4/3" onclick="setFormat(this)">4:3</button>
        <button class="format-btn" data-fmt="1/1" onclick="setFormat(this)">1:1</button>
        <button class="format-btn" data-fmt="9/16" onclick="setFormat(this)">9:16</button>
      </div>
    </div>

    <div class="panel-section">
      <button class="export-btn" id="export-btn" onclick="exportImage()" disabled>
        Télécharger l'image
      </button>
      <div class="export-sub">JPEG · qualité 92% · prêt pour le web</div>
      <a class="reset-link" id="reset-link" style="display:none;" onclick="reset()">Charger une autre photo</a>
    </div>

  </div>
</div>

<div class="status">
  <div><span class="status-dot" id="status-dot"></span><span id="status-text">Aucune image chargée</span></div>
  <div id="status-dim"></div>
</div>

<script>
// ============ PRESETS ============
// 8 filtres avec un caractère fort, immédiatement reconnaissables.
const PRESETS = [
  {
    id: 'incandescent',
    name: 'Incandescent',
    saturation: 1.6,         // boost saturation au lieu de couper
    contrast: 1.35,
    brightness: 1.05,
    shadowsLift: 0.05,
    highlightsRoll: -0.15,
    duotone: null,
    overlay: { color: [255, 80, 30], alpha: 0.25, blend: 'overlay' },
    secondaryOverlay: { color: [180, 0, 60], alpha: 0.12, blend: 'multiply' },
    vignette: 0.7,
    grain: 0.18,
    grainSize: 1,
    halation: { color: [255, 100, 50], strength: 0.4 },
    chromatic: 0,
  },
  {
    id: 'cobalt',
    name: 'Cobalt',
    saturation: 0.6,
    contrast: 1.4,
    brightness: 0.9,
    shadowsLift: 0,
    highlightsRoll: -0.25,
    duotone: { shadow: [10, 20, 60], highlight: [200, 220, 255], strength: 0.7 },
    overlay: { color: [40, 80, 200], alpha: 0.18, blend: 'multiply' },
    secondaryOverlay: null,
    vignette: 0.65,
    grain: 0.22,
    grainSize: 1.2,
    halation: null,
    chromatic: 0.5,
  },
  {
    id: 'risograph',
    name: 'Risographie',
    saturation: 0.8,
    contrast: 1.5,
    brightness: 1.0,
    shadowsLift: 0.08,
    highlightsRoll: -0.05,
    duotone: { shadow: [255, 50, 90], highlight: [255, 230, 100], strength: 0.85 },
    overlay: null,
    secondaryOverlay: null,
    vignette: 0.2,
    grain: 0.4,
    grainSize: 2,
    halftone: { size: 4, alpha: 0.12 },
    chromatic: 0,
  },
  {
    id: 'cyanotype',
    name: 'Cyanotype',
    saturation: 0.0,
    contrast: 1.3,
    brightness: 1.0,
    shadowsLift: 0,
    highlightsRoll: 0,
    duotone: { shadow: [10, 30, 80], highlight: [200, 230, 255], strength: 1.0 },
    overlay: { color: [30, 70, 180], alpha: 0.25, blend: 'multiply' },
    secondaryOverlay: null,
    vignette: 0.5,
    grain: 0.3,
    grainSize: 1.5,
    halation: null,
    chromatic: 0,
  },
  {
    id: 'urgence',
    name: 'Urgence',
    saturation: 1.4,
    contrast: 1.5,
    brightness: 0.95,
    shadowsLift: 0,
    highlightsRoll: -0.2,
    duotone: null,
    overlay: { color: [255, 30, 30], alpha: 0.22, blend: 'multiply' },
    secondaryOverlay: { color: [255, 200, 0], alpha: 0.15, blend: 'overlay' },
    vignette: 0.85,
    grain: 0.35,
    grainSize: 1.5,
    halation: { color: [255, 60, 30], strength: 0.5 },
    chromatic: 1.5,
  },
  {
    id: 'memoire',
    name: 'Mémoire',
    saturation: 0.4,
    contrast: 1.15,
    brightness: 1.05,
    shadowsLift: 0.12,
    highlightsRoll: -0.2,
    duotone: { shadow: [40, 25, 15], highlight: [255, 230, 195], strength: 0.7 },
    overlay: { color: [180, 130, 80], alpha: 0.18, blend: 'multiply' },
    secondaryOverlay: null,
    vignette: 0.55,
    grain: 0.5,
    grainSize: 2.5,
    dustScratches: true,
    chromatic: 0,
  },
  {
    id: 'territoire',
    name: 'Territoire',
    saturation: 0.7,
    contrast: 1.3,
    brightness: 0.95,
    shadowsLift: 0.05,
    highlightsRoll: -0.15,
    duotone: { shadow: [10, 40, 30], highlight: [200, 220, 180], strength: 0.6 },
    overlay: { color: [40, 100, 60], alpha: 0.2, blend: 'multiply' },
    secondaryOverlay: null,
    vignette: 0.5,
    grain: 0.25,
    grainSize: 1.2,
    contourLines: true,
    chromatic: 0,
  },
  {
    id: 'spectre',
    name: 'Spectre',
    saturation: 1.8,
    contrast: 1.4,
    brightness: 0.95,
    shadowsLift: 0,
    highlightsRoll: -0.1,
    duotone: null,
    overlay: { color: [180, 60, 220], alpha: 0.25, blend: 'overlay' },
    secondaryOverlay: { color: [80, 200, 220], alpha: 0.18, blend: 'screen' },
    vignette: 0.7,
    grain: 0.3,
    grainSize: 1.5,
    halation: { color: [200, 80, 200], strength: 0.4 },
    chromatic: 2,
  },
];

// ============ STATE ============
const state = {
  img: null,
  imgW: 0, imgH: 0,
  preset: PRESETS[0],
  intensity: 1.0,
  format: 'original',
};

const canvas = document.getElementById('output-canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

// ============ RENDU PRESET TILES ============
function buildPresetTiles() {
  const grid = document.getElementById('preset-grid');
  grid.innerHTML = '';
  PRESETS.forEach((preset, i) => {
    const tile = document.createElement('div');
    tile.className = 'preset-tile' + (i === 0 ? ' active' : '');
    tile.dataset.idx = i;
    tile.onclick = () => setPreset(i, tile);

    const num = document.createElement('div');
    num.className = 'preset-num';
    num.textContent = String(i + 1).padStart(2, '0');
    tile.appendChild(num);

    const name = document.createElement('div');
    name.className = 'preset-name';
    name.textContent = preset.name;
    tile.appendChild(name);

    if (state.img) {
      // miniature de l'image traitée
      const thumb = document.createElement('canvas');
      thumb.width = 200;
      thumb.height = 200;
      thumb.className = 'preset-thumb';
      tile.appendChild(thumb);
      renderThumb(thumb, preset);
    } else {
      // gradient fallback signalant la couleur dominante du preset
      const fb = document.createElement('div');
      fb.className = 'preset-tile-fallback';
      fb.style.background = getFallbackGradient(preset);
      tile.appendChild(fb);
    }

    grid.appendChild(tile);
  });
}

function getFallbackGradient(p) {
  if (p.duotone) {
    const [r1,g1,b1] = p.duotone.shadow;
    const [r2,g2,b2] = p.duotone.highlight;
    return `linear-gradient(135deg, rgb(${r1},${g1},${b1}), rgb(${r2},${g2},${b2}))`;
  }
  if (p.overlay) {
    const [r,g,b] = p.overlay.color;
    return `linear-gradient(135deg, rgb(${Math.max(0,r-80)},${Math.max(0,g-80)},${Math.max(0,b-80)}), rgb(${r},${g},${b}))`;
  }
  return 'linear-gradient(135deg, #1a1a1a, #444)';
}

// ============ MINIATURE RENDER ============
function renderThumb(canvas, preset) {
  const tctx = canvas.getContext('2d');
  const size = 200;
  // Crop carré centré
  const src = state.img;
  const min = Math.min(src.naturalWidth, src.naturalHeight);
  const sx = (src.naturalWidth - min) / 2;
  const sy = (src.naturalHeight - min) / 2;
  tctx.drawImage(src, sx, sy, min, min, 0, 0, size, size);
  applyEffects(tctx, size, size, preset, 1.0);
}

// ============ APPLY EFFECTS ============
function applyEffects(c, w, h, p, intensity) {
  const imageData = c.getImageData(0, 0, w, h);
  const data = imageData.data;

  const sat = lerp(1, p.saturation, intensity);
  const cont = lerp(1, p.contrast, intensity);
  const bright = lerp(1, p.brightness, intensity);
  const shadowsLift = p.shadowsLift * intensity;
  const highlightsRoll = p.highlightsRoll * intensity;

  for (let i = 0; i < data.length; i += 4) {
    let r = data[i] / 255;
    let g = data[i+1] / 255;
    let b = data[i+2] / 255;

    // Brightness
    r *= bright; g *= bright; b *= bright;

    // Contrast
    r = (r - 0.5) * cont + 0.5;
    g = (g - 0.5) * cont + 0.5;
    b = (b - 0.5) * cont + 0.5;

    // Shadows lift
    if (shadowsLift !== 0) {
      const shFactor = 1 - smoothstep(0, 0.4, (r+g+b)/3);
      r += shadowsLift * shFactor;
      g += shadowsLift * shFactor;
      b += shadowsLift * shFactor;
    }

    // Highlights roll-off
    if (highlightsRoll !== 0) {
      const lum = 0.299 * r + 0.587 * g + 0.114 * b;
      if (lum > 0.6) {
        const hl = smoothstep(0.6, 1.0, lum);
        r += highlightsRoll * hl;
        g += highlightsRoll * hl;
        b += highlightsRoll * hl;
      }
    }

    // Saturation
    const gray = 0.299 * r + 0.587 * g + 0.114 * b;
    r = gray + (r - gray) * sat;
    g = gray + (g - gray) * sat;
    b = gray + (b - gray) * sat;

    // Duotone mapping
    if (p.duotone) {
      const lum = clamp01(0.299 * r + 0.587 * g + 0.114 * b);
      const [sr,sg,sb] = p.duotone.shadow;
      const [hr,hg,hb] = p.duotone.highlight;
      const dr = (sr/255 + (hr/255 - sr/255) * lum);
      const dg = (sg/255 + (hg/255 - sg/255) * lum);
      const db = (sb/255 + (hb/255 - sb/255) * lum);
      const ds = p.duotone.strength * intensity;
      r = r * (1 - ds) + dr * ds;
      g = g * (1 - ds) + dg * ds;
      b = b * (1 - ds) + db * ds;
    }

    data[i]   = clamp01(r) * 255;
    data[i+1] = clamp01(g) * 255;
    data[i+2] = clamp01(b) * 255;
  }
  c.putImageData(imageData, 0, 0);

  // Halation : flou rouge sur les hautes lumières
  if (p.halation) applyHalation(c, w, h, p.halation, intensity);

  // Aberration chromatique
  if (p.chromatic > 0) applyChromatic(c, w, h, p.chromatic * intensity);

  // Overlay
  if (p.overlay) applyOverlay(c, w, h, p.overlay, intensity);
  if (p.secondaryOverlay) applyOverlay(c, w, h, p.secondaryOverlay, intensity);

  // Halftone (Risographie)
  if (p.halftone) applyHalftone(c, w, h, p.halftone, intensity);

  // Lignes contour (Territoire)
  if (p.contourLines) applyContourLines(c, w, h, intensity);

  // Vignette
  if (p.vignette > 0) applyVignette(c, w, h, p.vignette * intensity);

  // Grain
  if (p.grain > 0) applyGrain(c, w, h, p.grain * intensity, p.grainSize || 1);

  // Dust & scratches (Mémoire)
  if (p.dustScratches) applyDustScratches(c, w, h, intensity);

  c.globalCompositeOperation = 'source-over';
}

// ============ EFFECTS ============
function applyOverlay(c, w, h, ov, intensity) {
  const [r, g, b] = ov.color;
  const alpha = ov.alpha * intensity;
  c.globalCompositeOperation = ov.blend;
  c.fillStyle = `rgba(${r},${g},${b},${alpha})`;
  c.fillRect(0, 0, w, h);
  c.globalCompositeOperation = 'source-over';
}

function applyHalation(c, w, h, hal, intensity) {
  // Détecte les zones lumineuses et y ajoute un halo coloré flou
  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  const tctx = tmp.getContext('2d');
  tctx.drawImage(c.canvas, 0, 0);

  const id = tctx.getImageData(0, 0, w, h);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const lum = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
    if (lum > 200) {
      const [r,g,b] = hal.color;
      d[i] = r; d[i+1] = g; d[i+2] = b;
      d[i+3] = (lum - 200) * 2;
    } else {
      d[i+3] = 0;
    }
  }
  tctx.putImageData(id, 0, 0);

  c.globalCompositeOperation = 'screen';
  c.filter = `blur(${10 * intensity}px)`;
  c.globalAlpha = hal.strength * intensity;
  c.drawImage(tmp, 0, 0);
  c.filter = 'none';
  c.globalAlpha = 1;
  c.globalCompositeOperation = 'source-over';
}

function applyChromatic(c, w, h, strength) {
  // Décale légèrement les canaux R et B pour effet aberration
  const offset = Math.round(strength);
  if (offset === 0) return;
  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  const tctx = tmp.getContext('2d');
  tctx.drawImage(c.canvas, 0, 0);
  const src = tctx.getImageData(0, 0, w, h);
  const dst = c.getImageData(0, 0, w, h);
  const sd = src.data, dd = dst.data;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      const xr = Math.max(0, Math.min(w-1, x - offset));
      const xb = Math.max(0, Math.min(w-1, x + offset));
      dd[i]   = sd[(y * w + xr) * 4];
      dd[i+1] = sd[i+1];
      dd[i+2] = sd[(y * w + xb) * 4 + 2];
    }
  }
  c.putImageData(dst, 0, 0);
}

function applyHalftone(c, w, h, ht, intensity) {
  // Trame de points, comme une vraie risographie
  c.globalCompositeOperation = 'multiply';
  const size = ht.size;
  const alpha = ht.alpha * intensity;
  c.fillStyle = `rgba(0,0,0,${alpha})`;
  for (let x = 0; x < w; x += size * 2) {
    for (let y = 0; y < h; y += size * 2) {
      c.beginPath();
      c.arc(x + size, y + size, size * 0.7, 0, Math.PI * 2);
      c.fill();
    }
  }
  c.globalCompositeOperation = 'source-over';
}

function applyContourLines(c, w, h, intensity) {
  // Lignes de niveau topographique
  c.globalCompositeOperation = 'overlay';
  c.strokeStyle = `rgba(255,255,255,${0.05 * intensity})`;
  c.lineWidth = 0.5;
  for (let y = 0; y < h; y += 3) {
    c.beginPath();
    c.moveTo(0, y);
    for (let x = 0; x < w; x += 8) {
      c.lineTo(x, y + Math.sin(x * 0.05 + y * 0.02) * 1.5);
    }
    c.stroke();
  }
  c.globalCompositeOperation = 'source-over';
}

function applyVignette(c, w, h, strength) {
  const grad = c.createRadialGradient(w/2, h/2, Math.min(w,h)*0.2, w/2, h/2, Math.max(w,h)*0.85);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, `rgba(0,0,0,${strength * 0.85})`);
  c.fillStyle = grad;
  c.fillRect(0, 0, w, h);
}

function applyGrain(c, w, h, strength, size) {
  const id = c.getImageData(0, 0, w, h);
  const d = id.data;
  const amount = strength * 80;
  if (size === 1) {
    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random() - 0.5) * amount;
      d[i] = clamp255(d[i] + n);
      d[i+1] = clamp255(d[i+1] + n);
      d[i+2] = clamp255(d[i+2] + n);
    }
  } else {
    // Grain plus gros via blocs
    const blockSize = Math.round(size);
    for (let y = 0; y < h; y += blockSize) {
      for (let x = 0; x < w; x += blockSize) {
        const n = (Math.random() - 0.5) * amount;
        for (let dy = 0; dy < blockSize && y+dy < h; dy++) {
          for (let dx = 0; dx < blockSize && x+dx < w; dx++) {
            const i = ((y+dy) * w + (x+dx)) * 4;
            d[i] = clamp255(d[i] + n);
            d[i+1] = clamp255(d[i+1] + n);
            d[i+2] = clamp255(d[i+2] + n);
          }
        }
      }
    }
  }
  c.putImageData(id, 0, 0);
}

function applyDustScratches(c, w, h, intensity) {
  c.globalCompositeOperation = 'screen';
  // Rayures
  for (let i = 0; i < 8 * intensity; i++) {
    const x = Math.random() * w;
    const len = 30 + Math.random() * 100;
    c.strokeStyle = `rgba(255,240,220,${0.05 + Math.random() * 0.1})`;
    c.lineWidth = 0.5 + Math.random() * 0.5;
    c.beginPath();
    c.moveTo(x, Math.random() * h);
    c.lineTo(x + (Math.random()-0.5)*3, Math.random() * h);
    c.stroke();
  }
  // Poussière
  for (let i = 0; i < 60 * intensity; i++) {
    const x = Math.random() * w;
    const y = Math.random() * h;
    const r = 0.3 + Math.random() * 1.2;
    c.fillStyle = `rgba(255,240,220,${0.05 + Math.random() * 0.15})`;
    c.beginPath();
    c.arc(x, y, r, 0, Math.PI*2);
    c.fill();
  }
  c.globalCompositeOperation = 'source-over';
}

// ============ HELPERS ============
function clamp01(v) { return Math.max(0, Math.min(1, v)); }
function clamp255(v) { return Math.max(0, Math.min(255, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function smoothstep(a, b, x) {
  const t = clamp01((x - a) / (b - a));
  return t * t * (3 - 2 * t);
}

// ============ MAIN RENDER ============
function render() {
  if (!state.img) return;

  let sw = state.imgW, sh = state.imgH, sx = 0, sy = 0;
  const ratios = { 'original': null, '16/9': 16/9, '4/3': 4/3, '1/1': 1, '9/16': 9/16 };
  const ratio = ratios[state.format];
  if (ratio) {
    const srcRatio = sw / sh;
    if (srcRatio > ratio) { sw = Math.round(sh * ratio); sx = Math.round((state.imgW - sw) / 2); }
    else { sh = Math.round(sw / ratio); sy = Math.round((state.imgH - sh) / 2); }
  }

  const maxW = 1600, maxH = 1200;
  let rw = sw, rh = sh;
  if (rw > maxW) { rh = Math.round(rh * maxW / rw); rw = maxW; }
  if (rh > maxH) { rw = Math.round(rw * maxH / rh); rh = maxH; }

  canvas.width = rw;
  canvas.height = rh;
  ctx.drawImage(state.img, sx, sy, sw, sh, 0, 0, rw, rh);
  applyEffects(ctx, rw, rh, state.preset, state.intensity);
}

// ============ INTERACTIONS ============
function setPreset(idx, el) {
  document.querySelectorAll('.preset-tile').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  state.preset = PRESETS[idx];
  render();
}

function setIntensity(el) {
  document.querySelectorAll('.intensity-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  state.intensity = parseFloat(el.dataset.intensity);
  render();
  buildPresetTiles(); // recalcule les miniatures à la nouvelle intensité
  // restaure le preset actif sur la grille
  const activeIdx = PRESETS.indexOf(state.preset);
  document.querySelectorAll('.preset-tile')[activeIdx]?.classList.add('active');
}

function setFormat(el) {
  document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  state.format = el.dataset.fmt;
  render();
}

function exportImage() {
  if (!state.img) return;
  const link = document.createElement('a');
  link.download = 'future-' + state.preset.id + '.jpg';
  link.href = canvas.toDataURL('image/jpeg', 0.92);
  link.click();
}

function reset() {
  state.img = null;
  document.getElementById('drop-zone').style.display = 'flex';
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('export-btn').disabled = true;
  document.getElementById('reset-link').style.display = 'none';
  document.getElementById('status-dot').classList.remove('ready');
  document.getElementById('status-text').textContent = 'Aucune image chargée';
  document.getElementById('status-dim').textContent = '';
  buildPresetTiles();
}

// ============ LOAD ============
function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      state.img = img;
      state.imgW = img.naturalWidth;
      state.imgH = img.naturalHeight;
      document.getElementById('drop-zone').style.display = 'none';
      document.getElementById('preview-wrap').style.display = 'block';
      document.getElementById('export-btn').disabled = false;
      document.getElementById('reset-link').style.display = 'block';
      document.getElementById('status-dot').classList.add('ready');
      document.getElementById('status-text').textContent = file.name;
      document.getElementById('status-dim').textContent = `${img.naturalWidth} × ${img.naturalHeight} px`;
      render();
      buildPresetTiles();
      // re-active le preset courant
      const activeIdx = PRESETS.indexOf(state.preset);
      document.querySelectorAll('.preset-tile')[activeIdx]?.classList.add('active');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ============ EVENTS ============
document.getElementById('drop-zone').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });

const dz = document.getElementById('canvas-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); });
dz.addEventListener('dragleave', () => document.getElementById('drop-zone').classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});

// init
buildPresetTiles();
</script>
